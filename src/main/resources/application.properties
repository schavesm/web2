spring.application.name=web2


# ============================================
#  Configuración de la Base de Datos MySQL
# ============================================
#spring.datasource.url=jdbc:mysql://localhost:3306/mondongo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
#database-mondongo.cla0csoywxk6.us-east-2.rds.amazonaws.com
#spring.datasource.url=jdbc:mysql://database-mondongo.cla0csoywxk6.us-east-2.rds.amazonaws.com:3306/mondongo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true

spring.datasource.username=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
#  Configuración JPA / Hibernate
# ============================================

# update: crea/actualiza tablas automáticamente
# create-drop: recrea la tabla al iniciar (útil en dev)
spring.jpa.hibernate.ddl-auto=update

# Muestra las queries SQL en consola (desarrollo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto MySQL 8
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
#  Configuración del servidor
# ============================================
server.port=8080